name: Chronicle checks

on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        node: [22.16.0, 24]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm audit --audit-level=moderate

  notify-discord:
    name: Notify Discord
    needs: test
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.test.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: read
      statuses: write
    concurrency:
      group: discord-main-${{ github.sha }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
      - name: Post Chronicle update
        env:
          DISCORD_MAIN_UPDATES_WEBHOOK_URL: ${{ secrets.DISCORD_MAIN_UPDATES_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/post-discord-update.mjs
